name: Build & Deploy — rng-market

on:
  push:
    branches: [main, preview]

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"

jobs:
  build-deploy:
    name: Build & deploy rng-market
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL:       ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
        run: npm run build

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Deploy to Firebase Hosting (main → live)
        if: github.ref == 'refs/heads/main'
        run: npx firebase-tools deploy --only hosting:market --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --non-interactive

      - name: Deploy to Firebase Hosting (preview channel)
        if: github.ref == 'refs/heads/preview'
        run: |
          CHANNEL="${{ vars.FIREBASE_PREVIEW_CHANNEL }}"
          if [ -z "$CHANNEL" ]; then
            echo "FIREBASE_PREVIEW_CHANNEL is not set. Configure it in GitHub Actions Variables."
            exit 1
          fi
          npx firebase-tools hosting:channel:deploy "$CHANNEL" \
            --only market \
            --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --non-interactive
